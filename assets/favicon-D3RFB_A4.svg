<svg xmlns="http://w3.org" viewBox="0 0 32 32" width="100%" height="100%">
  <defs>
    <!-- Dit zorgt voor het mooie kleurverloop van geel naar vuurrood -->
    <linearGradient id="fireGradient" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#FFB300" />
      <stop offset="50%" stop-color="#FF6D00" />
      <stop offset="100%" stop-color="#DD2C00" />
    </linearGradient>
    
    <!-- Het masker dat de vuist uitsnijdt uit de vlam -->
    <mask id="fistCutout">
      <!-- Alles wat wit is blijft staan (de vlam) -->
      <rect width="32" height="32" fill="#ffffff" />
      <!-- Alles wat zwart is wordt transparant (de vuist) -->
      <path d="M13,26 L19,26 L19,23 L13,23 Z M11,22 L21,22 L21,17 C21,15.5 20,15 19,15 L19,13 C19,12 18,12 17.5,12 C17,12 16.5,12.5 16.5,13.5 L16.5,12.5 C16.5,11.5 15.5,11.5 15,11.5 C14.5,11.5 14,12 14,13 L14,13.5 C14,12.5 13,12.5 12.5,12.5 C12,12.5 11.5,13 11.5,14 L11.5,18 C10,18 9.5,19 11,20 L11,22 Z" fill="#000000" />
    </mask>
  </defs>

  <!-- De vlam met het verloop en de uitgesneden vuist -->
  <path d="M16,2 C19,7 26,10 26,18 C26,24 21,28 16,28 C11,28 6,24 6,18 C6,11 13,7 16,2 Z" fill="url(#fireGradient)" mask="url(#fistCutout)" />
</svg>
