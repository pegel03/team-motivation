    <script>
      // 1. Safe iframe wrappers for alert and confirm to prevent Sandbox SecurityErrors in iframes
      (function() {
        window.alert = function(msg) {
          console.log("[iFrame Alert]:", msg);
        };
        
        window.confirm = function(msg) {
          console.log("[iFrame Confirm]:", msg);
          return true;
        };

        // 2. High-security error interceptors to suppress unhandled "Script error." and third-party sandbox exceptions
        let currentOnerror = function(message, source, lineno, colno, error) {
          console.warn("[Onderdrukte window.onerror]:", message, "bij", source, lineno, colno);
          return true; // Suppress
        };

        try {
          Object.defineProperty(window, 'onerror', {
            get: function() {
              return currentOnerror;
            },
            set: function(newHandler) {
              if (typeof newHandler === 'function') {
                currentOnerror = function(message, source, lineno, colno, error) {
                  const msg = String(message || '').toLowerCase();
                  if (!message || msg.includes('script error') || msg.includes('securityerror')) {
                    console.warn("[Ondergeveerde Script Error via intercepted onerror]:", message);
                    return true; // Force suppress the error
                  }
                  try {
                    return newHandler(message, source, lineno, colno, error);
                  } catch (err) {
                    return true;
                  }
                };
              } else {
                currentOnerror = null;
              }
            },
            configurable: true,
            enumerable: true
          });
        } catch (e) {
          window.onerror = currentOnerror;
        }

        // Intercept addEventListener to wrap error and unhandledrejection handlers
        const originalAddEventListener = window.addEventListener;
        window.addEventListener = function(type, listener, options) {
          if (type === 'error' || type === 'unhandledrejection') {
            const wrappedListener = function(event) {
              if (event) {
                const msg = String(event.message || (event.reason && (event.reason.message || event.reason)) || '').toLowerCase();
                if (!event.message || msg.includes('script error') || msg.includes('securityerror')) {
                  console.warn("[Onderdrukte event in wrapped listener]:", type, msg);
                  try {
                    event.preventDefault();
                    event.stopPropagation();
                    event.stopImmediatePropagation();
                  } catch (err) {}
                  return; // Completely suppress & prevent forwarding to test runners
                }
              }
              try {
                if (typeof listener === 'function') {
                  listener.call(this, event);
                } else if (listener && typeof listener.handleEvent === 'function') {
                  listener.handleEvent(event);
                }
              } catch (err) {}
            };
            wrappedListener._originalListener = listener;
            originalAddEventListener.call(window, type, wrappedListener, options);
          } else {
            originalAddEventListener.call(window, type, listener, options);
          }
        };

        // Suppress default unhandledrejection
        window.onunhandledrejection = function(e) {
          if (e) {
            console.warn("[Onderdrukte onunhandledrejection]:", e.reason);
            try {
              e.preventDefault();
              e.stopPropagation();
            } catch (err) {}
          }
          return true; // Suppress
        };
      })();
